name: ci

# Tier 1 — hermetic tests. No $HOME/.claude reads, no real `claude`
# subprocess. Runs on GitHub-hosted macOS (matches the target platform).
# See core-docs/architecture/adr/0001-claude-runtime-primitive.md for the three-tier
# design.

on:
  push:
    branches: [main]
  pull_request:
  merge_group:
  workflow_dispatch:

# Scope by event_name so a PR run and its corresponding merge_group run don't
# cancel each other. Without `${{ github.event_name }}` in the key, queueing
# the same head would race the PR-context run against the queue-context run
# and drop required-check signals on the floor.
concurrency:
  group: ci-${{ github.event_name }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust / ${{ matrix.job }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        job: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v5

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2
        with:
          # Bumped from default `v0-rust` to bust the poisoned cache that
          # restored a broken `~/.cargo/bin/cargo` (actually `rustup-init`)
          # — cargo invocations failed with "unexpected argument 'test'".
          # Observed on macos-15-arm64 runs of PR #134 (transient on rerun)
          # and PR #136 (stuck on the same cache key). Bump again if the
          # symptom recurs after fresh cache populates.
          prefix-key: v1-rust
          # Don't cache ~/.cargo/bin — that's what got poisoned. rustup
          # restores cargo/rustc/clippy on each run anyway; the cost of
          # re-installing cargo-installed bins on cache miss is small.
          cache-bin: false

      - name: cargo test --workspace
        if: matrix.job == 'test'
        # Exercises every workspace member's unit + integration tests
        # (test targets under `tests/`). Phase 24I added:
        #   - apps/desktop/src-tauri/tests/round_trip_e2e.rs — drives
        #     `cmd_post_message` → scripted ToolUse → `cmd_resolve_approval`
        #     → AgentTurnEnded + ApprovalGranted via the production
        #     `InboxPermissionHandler`.
        #   - crates/designer-core/tests/store_ordering.rs — pins
        #     `read_all`'s `(timestamp ASC, rowid ASC)` tiebreaker per
        #     PR #125's flake-fix rationale.
        # Both are required by virtue of this job being a required
        # check; do not add a separate "integration-tests" step (the
        # work would duplicate).
        run: cargo test --workspace --locked

      - name: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo fmt --check
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check

  frontend:
    name: frontend
    # macOS matches the product's target platform and sidesteps npm's
    # optional-deps bug (rollup's linux-x64-gnu native binary isn't in a
    # lockfile generated on macOS — https://github.com/npm/cli/issues/4828).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - run: |
          if [ -f package.json ]; then
            npm ci
            npm run -s typecheck --if-present
            npm run -s test --if-present
          fi

  design-system:
    name: design-system
    # Mini's enforcement gates — run cheaply on Linux since these are
    # pure-Node scripts with no platform-specific deps. See ADR 0006
    # and FB-0034 for the AI-enforcement-loop motivation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
      - name: invariants — no arbitrary px/hex/ms/z-index, primitives package-imported
        run: node tools/invariants/check.mjs packages/app/src
      - name: manifest coverage — every component file has a manifest entry
        run: node tools/manifest/check.mjs

  visual-regression:
    name: visual-regression
    # Pinned to Linux for deterministic font rendering. Baselines under
    # packages/app/src/test/visual/__screenshots__/ are also generated on
    # Linux — running the comparison anywhere else would be noise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-node@v5
        with:
          node-version: '20'
          cache: 'npm'
      - name: install deps (linux-aware)
        # See `regenerate-visual-baselines.yml` — `npm ci` against a
        # macOS-authored lockfile fails on Linux because the rollup
        # optional native binary isn't pinned (npm/cli#4828).
        run: |
          rm -f package-lock.json
          npm install --no-audit --no-fund
      - name: install playwright chromium
        run: npx --workspace @designer/app playwright install --with-deps chromium
      - name: npm run test:visual
        run: npm --workspace @designer/app run test:visual
      - name: upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v6
        with:
          name: visual-diffs
          path: |
            packages/app/src/test/visual/__screenshots__/*.actual.png
            packages/app/src/test/visual/__screenshots__/*.diff.png
          if-no-files-found: ignore
