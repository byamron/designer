name: ci

# Tier 1 — hermetic tests. No $HOME/.claude reads, no real `claude`
# subprocess. Runs on GitHub-hosted macOS (matches the target platform).
# See core-docs/adr/0001-claude-runtime-primitive.md for the three-tier
# design.

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  rust:
    name: rust / ${{ matrix.job }}
    runs-on: macos-latest
    strategy:
      fail-fast: false
      matrix:
        job: [test, clippy, fmt]
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy, rustfmt

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: cargo test --workspace
        if: matrix.job == 'test'
        run: cargo test --workspace --locked

      - name: cargo clippy --workspace --all-targets -- -D warnings
        if: matrix.job == 'clippy'
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: cargo fmt --check
        if: matrix.job == 'fmt'
        run: cargo fmt --all -- --check

  frontend:
    name: frontend
    # macOS matches the product's target platform and sidesteps npm's
    # optional-deps bug (rollup's linux-x64-gnu native binary isn't in a
    # lockfile generated on macOS — https://github.com/npm/cli/issues/4828).
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: |
          if [ -f package.json ]; then
            npm ci
            npm run -s typecheck --if-present
            npm run -s test --if-present
          fi

  design-system:
    name: design-system
    # Mini's enforcement gates — run cheaply on Linux since these are
    # pure-Node scripts with no platform-specific deps. See ADR 0006
    # and FB-0034 for the AI-enforcement-loop motivation.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - name: invariants — no arbitrary px/hex/ms/z-index, primitives package-imported
        run: node tools/invariants/check.mjs packages/app/src
      - name: manifest coverage — every component file has a manifest entry
        run: node tools/manifest/check.mjs

  visual-regression:
    name: visual-regression
    # Pinned to Linux for deterministic font rendering. Baselines under
    # packages/app/src/test/visual/__screenshots__/ are also generated on
    # Linux — running the comparison anywhere else would be noise.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci
      - name: install playwright chromium
        run: npx --workspace @designer/app playwright install --with-deps chromium
      - name: npm run test:visual
        run: npm --workspace @designer/app run test:visual
      - name: upload diff artifacts on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: visual-diffs
          path: |
            packages/app/src/test/visual/__screenshots__/*.actual.png
            packages/app/src/test/visual/__screenshots__/*.diff.png
          if-no-files-found: ignore
