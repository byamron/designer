name: claude-live

# Tier 2 — live integration tests against the real `claude` binary with the
# user's keychain-backed OAuth subscription. Runs exclusively on a
# self-hosted macOS runner registered by the project maintainer; the workflow
# gates on the `claude` label so GitHub never routes this job to a hosted VM
# (which wouldn't have auth anyway).
#
# See core-docs/adr/0001-claude-runtime-primitive.md and
# core-docs/spec.md Decision 33 for the auth compliance rationale.

on:
  pull_request:
  workflow_dispatch:

concurrency:
  group: claude-live-${{ github.ref }}
  cancel-in-progress: true

jobs:
  live:
    name: claude live integration
    # Label set scoped to this repo's self-hosted runner(s). The `claude`
    # label signals that this host has a logged-in Claude Code install.
    runs-on: [self-hosted, macOS, claude]
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v5

      - name: Resolve claude install path
        # The self-hosted runner spawns non-login, non-interactive shells, so
        # PATH augmentations from `~/.zshrc` (npm-global, Homebrew) are not
        # inherited. Resolve the npm-global prefix explicitly and append to
        # GITHUB_PATH so subsequent steps can call `claude` by name.
        run: |
          set -euo pipefail
          # Try npm; fall back to the well-known macOS install locations.
          if command -v npm >/dev/null 2>&1; then
            NPM_PREFIX="$(npm config get prefix)"
            echo "$NPM_PREFIX/bin" >> "$GITHUB_PATH"
          fi
          # Belt + suspenders: include the typical Mac install dirs in case
          # `npm` itself isn't on the runner's stripped PATH.
          for dir in \
            "$HOME/.npm-global/bin" \
            "/opt/homebrew/bin" \
            "/usr/local/bin"; do
            if [ -d "$dir" ]; then
              echo "$dir" >> "$GITHUB_PATH"
            fi
          done

      - name: Verify claude is on PATH and authenticated
        run: |
          set -euo pipefail
          claude --version
          # We never print auth state or token info. Just a presence check.
          test -d "$HOME/.claude" || { echo "::error::no ~/.claude on runner"; exit 1; }

      - name: cargo test --features claude_live
        run: |
          set -euo pipefail
          # `--test-threads=1` serializes the two live tests. They each
          # spawn their own `claude` subprocess; running in parallel
          # produces resource and rate-limit contention on the runner
          # that pushes `permission_prompt_round_trip` past its budget.
          cargo test --locked --features claude_live \
            -p designer-claude --test claude_live \
            -- --test-threads=1 --nocapture
