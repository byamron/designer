name: release

# DP-A — Sign + notarize + ship Designer.
#
# Fires on a `v*` tag push (or manual workflow_dispatch). Builds the
# macOS DMG with the Apple Developer ID certificate, runs notarytool
# against the App Store Connect API key, signs the updater bundle with
# the Tauri minisign keypair, and uploads everything to a GitHub
# Release. The Tauri updater plugin in the running app reads the
# `latest.json` manifest from the release and offers the user an
# in-place update.
#
# Required GitHub Actions secrets (set under Settings → Secrets):
#   APPLE_CERTIFICATE              base64 of the .p12 export
#   APPLE_CERTIFICATE_PASSWORD     password used during .p12 export
#   APPLE_SIGNING_IDENTITY         e.g. "Developer ID Application: …"
#   APPLE_TEAM_ID                  10-char Apple team identifier
#   APPLE_API_KEY                  contents of the App Store Connect .p8
#   APPLE_API_KEY_ID               10-char key ID
#   APPLE_API_ISSUER_ID            UUID issuer ID
#   TAURI_SIGNING_PRIVATE_KEY      contents of ~/.tauri/designer-updater.key
#   TAURI_SIGNING_PRIVATE_KEY_PASSWORD  empty for v0.1.0 (no passphrase set)

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: build / ${{ matrix.target }}
    runs-on: macos-latest
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: aarch64-apple-darwin
            args: --target aarch64-apple-darwin
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install npm dependencies
        run: npm ci

      # tauri-action's notarization step needs the App Store Connect API
      # key as a file on disk (APPLE_API_KEY_PATH), not as an env-var
      # blob. We hold the .p8 contents in the APPLE_API_KEY secret and
      # materialize it here under a path the next step references.
      - name: Materialize Apple API key
        env:
          APPLE_API_KEY_CONTENTS: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
        run: |
          mkdir -p ~/private_keys
          KEY_PATH="$HOME/private_keys/AuthKey_${APPLE_API_KEY_ID}.p8"
          printf '%s' "$APPLE_API_KEY_CONTENTS" > "$KEY_PATH"
          chmod 600 "$KEY_PATH"
          echo "APPLE_API_KEY_PATH=$KEY_PATH" >> "$GITHUB_ENV"

      - name: Build Designer (sign + notarize + bundle)
        uses: tauri-apps/tauri-action@v0
        env:
          # GitHub release upload — without this tauri-action errors at
          # the publish step with "GITHUB_TOKEN is required".
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # Apple Developer ID signing — the bundler imports the .p12
          # into a temporary keychain and signs every binary in the
          # bundle with the named identity before the DMG is built.
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          # Notarization via App Store Connect API key. tauri-action
          # invokes notarytool which uploads the bundle, polls for
          # acceptance, and staples the ticket on success.
          # APPLE_API_KEY here is the 10-char Key ID; the .p8 file is
          # at APPLE_API_KEY_PATH (set by the previous step).
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER_ID }}
          # Tauri updater minisign keypair — separate from the Apple
          # cert. Used to sign the `.app.tar.gz` updater artifact + the
          # latest.json manifest the running app verifies on update.
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Designer ${{ github.ref_name }}"
          releaseBody: "See `core-docs/history.md` for what shipped."
          releaseDraft: false
          prerelease: false
          projectPath: apps/desktop
          args: ${{ matrix.args }}
          # Emit `latest.json` next to the DMG so the updater endpoint
          # (`/releases/latest/download/latest.json`) resolves to the
          # newest release without needing a per-version URL.
          includeUpdaterJson: true
