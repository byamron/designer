# cargo-deny configuration — Phase 16.S supply-chain gates.
#
# Severity policy mirrors `core-docs/security.md` §16.S "Supply-chain CI policy":
# blocking on HIGH/CRITICAL advisories, warning on MEDIUM/LOW. cargo-deny does
# not encode CVSS severity itself; we surface every advisory as a warning here
# and let the workflow's post-processing step apply the block-vs-warn split
# against `cargo audit --json`. The `cargo deny check` job only blocks on
# license / banned-source / yanked-crate violations.
#
# License allowlist matches what the current dep tree resolves to as of
# 2026-04-30 (`cargo deny list`). Do not broaden without a deliberate review.

[graph]
# Designer ships only on macOS for v1; Linux/Windows targets are spec-deferred
# (see core-docs/spec.md §"Platform"). Restricting cargo-deny to the macOS
# triples we actually build for keeps the dep graph honest — Linux-only
# transitives (gtk, glib, atk, x11-dl, …) and Windows-only ones (windows-*,
# wry's webview2 path) drop out of the license + advisory checks.
targets = [
    { triple = "aarch64-apple-darwin" },
    { triple = "x86_64-apple-darwin" },
]
all-features = false
no-default-features = false

[advisories]
# Default DB. db-path / db-urls are inherited from cargo-deny defaults; CI
# caches `~/.cargo/advisory-db` so daily drift runs are cheap.
version = 2
yanked = "deny"
# Vulnerability advisories (RUSTSEC CVEs) are always denied — block at the
# `cargo audit` step, where the post-processing step applies the HIGH/CRITICAL
# severity gate per `core-docs/security.md` §16.S.
#
# `unmaintained = "workspace"` only fails when a workspace crate *directly*
# depends on an unmaintained crate. Transitive unmaintained advisories
# (e.g., `unic-*` via tauri-utils, `fxhash` via tauri-codegen) surface as
# warnings — fixing them requires upstream tauri to update, which is not
# something we can gate our own merges on. RUSTSEC IDs as of 2026-04-30:
#   - RUSTSEC-2025-0057 (fxhash, via tauri-codegen)
#   - RUSTSEC-2025-0075 (unic-char-range, via tauri-utils → urlpattern)
#   - RUSTSEC-2025-0080 (unic-common, ditto)
#   - RUSTSEC-2025-0081 (unic-char-property, ditto)
#   - RUSTSEC-2025-0098 (unic-ucd-version, ditto)
#   - RUSTSEC-2025-0100 (unic-ucd-ident, ditto)
unmaintained = "workspace"
ignore = []

[licenses]
version = 2
# Allowlist derived from a one-shot `cargo deny list` on 2026-04-30 against the
# macOS dep tree. Permissive + weak-copyleft licenses that are standard for
# Rust ecosystem crates and compatible with shipping a closed-source binary.
#
# Notably absent:
#   - GPL-* / AGPL-* (strong copyleft; would force source release)
#   - LGPL-2.1-or-later (only appeared via `r-efi`, which is also MIT/Apache-2.0
#     — cargo-deny picks the permissive option from the OR expression, so we
#     don't need to allow LGPL itself)
allow = [
    "0BSD",
    "Apache-2.0",
    "Apache-2.0 WITH LLVM-exception",
    "BSD-2-Clause",
    "BSD-3-Clause",
    "CC0-1.0",
    # ISC is OSI-approved, FSF-Free, and a permissive 2-clause-equivalent.
    # Pulled in via `tauri-plugin-updater` → `reqwest` → `rustls` → `ring`,
    # `rustls-webpki`, `untrusted`. Adding it here keeps the supply-chain
    # gate honest while permitting the standard Rust TLS stack.
    "ISC",
    "MIT",
    "MIT-0",
    "MPL-2.0",
    "Unicode-3.0",
    "Unlicense",
    "Zlib",
]
confidence-threshold = 0.8
exceptions = []

[licenses.private]
# Workspace crates are `license = "UNLICENSED"` (see workspace Cargo.toml).
# Skip license enforcement on our own unpublished crates.
ignore = true

[bans]
# Multiple-version warnings are noisy in a Tauri workspace (windows-* trees
# ship many parallel majors); keep them visible but not blocking.
multiple-versions = "warn"
# Wildcard external deps are denied — they're a soft footgun for reproducible
# builds. `allow-wildcard-paths = true` carves out workspace-internal path
# deps (e.g. `designer-core = { path = "..." }` in the root Cargo.toml) which
# are inherently version-less and not subject to the same risk.
wildcards = "deny"
allow-wildcard-paths = true
highlight = "all"
workspace-default-features = "allow"
external-default-features = "allow"
allow = []
deny = [
    # Add specific banned crates here with a reason. Empty today — bans is the
    # surface where a known-malicious dep would land if RUSTSEC publishes one
    # we need to enforce ahead of an upstream patch.
]
skip = []
skip-tree = []

[sources]
unknown-registry = "deny"
unknown-git = "deny"
allow-registry = ["https://github.com/rust-lang/crates.io-index"]
allow-git = []
